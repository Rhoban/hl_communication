syntax = "proto2";

package hl_communication;

enum Action {
  INCAPABLE        = 0;// Robot is penalized, unlocalized, or handled
  POSITIONING      = 1;// Robot is repositionning (but do not plan to kick immediately)
  GOING_TO_BALL    = 2;// Robot is moving toward the ball in order to kick
  SEARCHING_BALL   = 3;// Robot is trying to find the position of the ball on the field
  WAITING          = 4;// Robot is waiting 
}

/**
 * Describes the intention of the robot:
 * - Uncertainty can be used to express tolerance on targets or uncertainty on action results
 */
message Intention {
  /**
   * Current action planned by the robot
   */
  optional Action action_planned = 1;

}
