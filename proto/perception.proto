syntax = "proto2";

package hl_communication;

import "position.proto";

/**
 * Perception of the world state by the robot
 */
message Perception {
  required Position2d ball_in_self = 1;
  required float ball_quality = 2;
  /**
   * All the estimated pose inside the field weighted by their probability
   */
  required Pose2d self_in_field = 3;
  required float field_quality = 4;
  /**
   * Position of the opponent goal in self basis.
   *
   * Note: might be inconsistent with 'self_in_field'
   */
  //optional Position2d opp_goal_in_self = 5; TODO: unused => remove?

  /**
   * Belief regarding positions of other robots in self referential
   */
  repeated Position2d robots_field = 6;

  /**
   * Velocity of the ball in self referential [m/s]
   */
  optional Position2d ball_velocity_in_self = 8;

  optional bool whistle_heard = 9;

  optional bool kicked = 10;

  optional bool opponent_moved_ball = 11;
}
